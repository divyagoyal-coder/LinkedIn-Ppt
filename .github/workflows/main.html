<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinkedIn Profile Mastery PPT</title>
    <style>
        :root {
            --bg: #0b1020;
            --card: #111831;
            --text: #eaf0ff;
            --muted: #a9b4d0;
            --accent: #6ee7ff;
            --accent2: #8b5cf6;
            --good: #34d399;
            --warn: #fbbf24
        }

        * {
            box-sizing: border-box
        }

        html,
        body {
            margin: 0;
            height: 100%;
            background: radial-gradient(circle at top, #18254a, #09101e 60%);
            color: var(--text);
            font-family: Inter, system-ui, Segoe UI, Arial, sans-serif;
            overflow: hidden
        }

        .app {
            height: 100%;
            display: flex;
            flex-direction: column
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            background: rgba(6, 10, 22, .55);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, .08)
        }

        .brand {
            font-weight: 700;
            letter-spacing: .4px
        }

        .timer {
            color: var(--muted)
        }

        .deck {
            position: relative;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 22px
        }

        .slide {
            position: absolute;
            width: min(1180px, 96vw);
            height: min(680px, 86vh);
            border-radius: 28px;
            background: linear-gradient(160deg, rgba(17, 24, 49, .96), rgba(8, 12, 25, .96));
            border: 1px solid rgba(255, 255, 255, .1);
            box-shadow: 0 24px 80px rgba(0, 0, 0, .45);
            padding: 34px 38px;
            opacity: 0;
            transform: translateX(70px) scale(.98);
            transition: all .72s cubic-bezier(.2, .85, .2, 1);
            pointer-events: none;
            overflow: hidden
        }

        .slide.active {
            opacity: 1;
            transform: translateX(0) scale(1);
            pointer-events: auto
        }

        .slide.ripple-out {
            animation: rippleOut .72s ease forwards
        }

        @keyframes rippleOut {
            0% {
                filter: blur(0);
                transform: scale(1)
            }

            100% {
                filter: blur(1px);
                transform: scale(1.03);
                opacity: .18
            }
        }

        .slide::before {
            content: "";
            position: absolute;
            inset: -40%;
            background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), rgba(110, 231, 255, .18), transparent 22%), radial-gradient(circle at 20% 20%, rgba(139, 92, 246, .14), transparent 18%), radial-gradient(circle at 80% 80%, rgba(52, 211, 153, .12), transparent 22%);
            pointer-events: none
        }

        .h1 {
            font-size: 48px;
            line-height: 1.02;
            margin: 0 0 10px
        }

        .h2 {
            font-size: 26px;
            margin: 0 0 18px;
            color: var(--accent)
        }

        .sub {
            font-size: 16px;
            color: var(--muted);
            max-width: 920px
        }

        .grid {
            display: grid;
            grid-template-columns: 1.05fr .95fr;
            gap: 18px;
            margin-top: 18px;
            height: calc(100% - 120px)
        }

        .panel {
            background: rgba(255, 255, 255, .04);
            border: 1px solid rgba(255, 255, 255, .09);
            border-radius: 20px;
            padding: 18px 20px;
            overflow: auto
        }

        ul {
            margin: 10px 0 0 18px;
            padding: 0
        }

        li {
            margin: 8px 0;
            color: #dce4ff
        }

        .badge {
            display: inline-block;
            padding: 7px 12px;
            border-radius: 999px;
            background: rgba(110, 231, 255, .14);
            color: #bdf5ff;
            margin-right: 8px;
            margin-bottom: 8px;
            border: 1px solid rgba(110, 231, 255, .22)
        }

        .example {
            display: grid;
            gap: 12px
        }

        .profile {
            padding: 14px;
            border-radius: 18px;
            background: linear-gradient(145deg, rgba(255, 255, 255, .07), rgba(255, 255, 255, .03));
            border: 1px solid rgba(255, 255, 255, .08)
        }

        .profile .name {
            font-weight: 700;
            font-size: 18px
        }

        .profile .role {
            color: var(--accent)
        }

        .profile .meta {
            font-size: 14px;
            color: var(--muted);
            margin-top: 4px
        }

        .prompt {
            white-space: pre-wrap;
            font-size: 13px;
            line-height: 1.55;
            color: #dfe8ff
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            color: var(--muted);
            border-top: 1px solid rgba(255, 255, 255, .08);
            background: rgba(6, 10, 22, .45)
        }

        .controls button {
            border: 0;
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            color: white;
            padding: 10px 16px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            margin-left: 8px
        }

        .progress {
            height: 6px;
            background: rgba(255, 255, 255, .08);
            border-radius: 999px;
            overflow: hidden;
            flex: 1;
            margin: 0 16px
        }

        .bar {
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            transition: width .4s
        }

        .kicker {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: .18em;
            color: #9deaff;
            margin-bottom: 10px
        }

        .two-col {
            columns: 2;
            column-gap: 24px
        }

        .small {
            font-size: 14px;
            color: var(--muted)
        }

        .codechip {
            font-family: ui-monospace, monospace;
            background: rgba(255, 255, 255, .08);
            padding: 2px 6px;
            border-radius: 8px
        }
    </style>
</head>

<body>
    <div class="app">
        <div class="topbar">
            <div class="brand">LinkedIn Profile Mastery for Web Coders</div>

        </div>
        <div class="deck" id="deck"></div>
        <div class="footer">
            <div id="slideInfo">Slide 1 / 9</div>
            <div class="progress">
                <div class="bar" id="bar"></div>
            </div>
            <div class="controls"><button id="prev">Prev</button><button id="next">Next</button></div>
        </div>
    </div>

        const slides = [

            `<div class='kicker'>Welcome</div>

            `<div class='kicker'>LinkedIn Activity</div>

</h2>

            `<div class='kicker'>Final Slide</div>

<h1 class='h1'>
Your LinkedIn Profile is Your Digital Portfolio 🚀
</h1>

</p>

        ];



        const deck = document.getElementById('deck');
        const info = document.getElementById('slideInfo');
        const bar = document.getElementById('bar');
        let i = 0;
        function render() {
            deck.innerHTML = '';
            const el = document.createElement('section');
            el.className = 'slide active';
            el.innerHTML = slides[i];
            deck.appendChild(el);
            info.textContent = `Slide ${i + 1} / ${slides.length}`;
            bar.style.width = ((i + 1) / slides.length * 100) + '%';
        }
        function next() { const cur = deck.querySelector('.slide'); if (cur) { cur.classList.add('ripple-out'); setTimeout(() => { i = (i + 1) % slides.length; render(); }, 420); } }
        function prev() { const cur = deck.querySelector('.slide'); if (cur) { cur.classList.add('ripple-out'); setTimeout(() => { i = (i - 1 + slides.length) % slides.length; render(); }, 420); } }
        document.getElementById('next').onclick = next; document.getElementById('prev').onclick = prev;
        document.addEventListener('keydown', e => { if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next() } if (e.key === 'ArrowLeft') prev() });
        deck.addEventListener('mousemove', e => { const r = deck.getBoundingClientRect(); const x = ((e.clientX - r.left) / r.width * 100).toFixed(1); const y = ((e.clientY - r.top) / r.height * 100).toFixed(1); const s = deck.querySelector('.slide.active'); if (s) { s.style.setProperty('--mx', x + '%'); s.style.setProperty('--my', y + '%'); } });
        render();
    </script>
</body>

</html>
